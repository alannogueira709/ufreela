services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=freela
      - POSTGRES_USER=freela_user
      - POSTGRES_PASSWORD=freela_pass

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/freela
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/freela:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
    depends_on:
      - backend         

volumes:
  postgres_data:
